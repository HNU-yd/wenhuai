project: kyn_ahr_v0_public
root: .
raw_dir: raw
processed_dir: processed
figures_dir: figures
metadata_tsv: metadata/metadata_public_v0.tsv
combined_h5ad: processed/public_mis_c_combined_raw.h5ad
v0_h5ad: processed/public_mis_c_v0_scanpy.h5ad

qc:
  min_genes: 200
  max_genes: 7000
  max_pct_mt: 20
  min_counts: 500

preprocess:
  normalize_target_sum: 10000
  n_hvg: 3000
  n_pcs: 50
  neighbors_k: 20
  leiden_resolution: 0.8
  batch_key: dataset
  use_harmony: true

analysis:
  group_key: group_v0
  sample_key: sample_id
  patient_key: patient_id
  myeloid_labels:
    - CD14_mono
    - FCGR3A_mono
    - DC
    - pDC
    - neutrophil_like
